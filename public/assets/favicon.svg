<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0B1030"/>

  <!-- Y fork shape — thick, bold, clear at small sizes -->
  <!-- Stem -->
  <line x1="32" y1="54" x2="32" y2="30" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
  <!-- Left arm -->
  <line x1="32" y1="30" x2="14" y2="12" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="32" y1="30" x2="50" y2="12" stroke="#a5b4fc" stroke-width="8" stroke-linecap="round"/>
</svg>
